<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>전공 암기노트 — 키워드 정리</title><style>
:root{--bg:#f5f6f8;--card:#fff;--ink:#1d2330;--muted:#71778a;--line:#e6e8ee;--accent:#4f46e5;--accent-soft:#eef0fe;--key:#b4530a;--keybg:#fff4e6;}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:920px;margin:0 auto;padding:0 18px 90px}
header.hero{padding:30px 0 12px}.kick{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.04em}
h1{font-size:25px;margin:6px 0 6px}.sub{color:var(--muted);font-size:14px;margin:0}
.badge{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(90deg,#fff7d6,#ffe884);color:#7a5b00;font-weight:700;font-size:12.5px;padding:6px 12px;border-radius:999px;border:1px solid #f6cf3f;margin-top:12px}
.toolbar{position:sticky;top:0;z-index:20;background:rgba(245,246,248,.93);backdrop-filter:blur(8px);padding:12px 0 6px;margin-top:12px;border-bottom:1px solid var(--line)}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.row input[type=search]{flex:1;min-width:190px;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:15px;background:#fff}
.row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.modebtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 14px;font-size:13.5px;cursor:pointer;color:var(--ink);font-weight:600;white-space:nowrap}
.modebtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;font-size:13px;cursor:pointer;color:var(--ink)}.btn:hover{background:#eef0f4}
.hint{font-size:12px;color:var(--muted);margin:8px 2px 0}
.tabs{display:flex;gap:7px;overflow-x:auto;padding:11px 0 4px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:13.5px;cursor:pointer;color:var(--ink);display:flex;gap:6px;align-items:center}
.tab .cnt{font-size:11px;color:var(--muted);background:#eef0f4;border-radius:999px;padding:1px 7px}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}.tab.active .cnt{background:rgba(255,255,255,.25);color:#fff}
.coursehdr{font-size:12px;color:var(--muted);font-weight:700;margin:24px 0 2px}
.subjtitle{display:flex;align-items:baseline;gap:9px;margin:2px 0 4px}.subjtitle h2{font-size:20px;margin:0}.subjtitle .n{font-size:12px;color:var(--muted)}
.sec{margin-top:20px}.secname{font-size:14.5px;font-weight:800;color:var(--accent);margin:0 0 9px;padding-left:10px;border-left:3px solid var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin:8px 0;transition:.12s}
.card .term{font-size:15.5px;font-weight:800;color:var(--key);background:var(--keybg);display:inline-block;padding:1px 7px;border-radius:6px;margin-bottom:6px}
.card .pg{float:right;font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
.card .def{font-size:14.7px;color:#2b3140}.card .def b{color:var(--accent);font-weight:700}
body.quiz .card{cursor:pointer}body.quiz .card .def{filter:blur(6px);user-select:none;opacity:.55;transition:.15s}
body.quiz .card.show .def{filter:none;opacity:1}
body.quiz .card::after{content:"👆 눌러서 정답 보기";display:block;font-size:11.5px;color:var(--muted);margin-top:4px}body.quiz .card.show::after{display:none}
.empty{color:var(--muted);text-align:center;padding:48px 0}
footer{color:var(--muted);font-size:12px;text-align:center;margin-top:36px}
@media print{.toolbar,.tabs,.badge,.noprint{display:none!important}.section{display:block!important}body.quiz .card .def{filter:none!important;opacity:1!important}.card{break-inside:avoid}body{background:#fff}}
@media(max-width:620px){h1{font-size:21px}.card .def{font-size:14.3px}}
</style></head><body><div class="wrap">
<header class="hero"><div class="kick">전공 시험 · 키워드 암기노트</div>
<h1>핵심 키워드 정리 (암기용)</h1>
<p class="sub"><b>실제 표시(형광펜·펜 밑줄)된 내용만</b> 키워드 → 핵심 설명으로 정리했어요.</p>
<div class="badge">⭐ 출제 범위 120% · 표시된 곳 = 나오는 곳</div></header>
<div class="toolbar"><div class="row">
<input id="q" type="search" placeholder="🔍 키워드 검색 (예: TCP, 트랜잭션, SOLID, 캡슐화…)">
<button id="quizbtn" class="modebtn" onclick="toggleQuiz()">🙈 암기 모드</button>
<button class="btn" onclick="window.print()">🖨️</button></div>
<div class="hint" id="hint">전체 98개 핵심 카드 · 손상된 표시는 제외하고 실제 표시된 부분만 담았어요. 암기 모드를 켜면 설명이 가려져요.</div>
<div class="tabs" id="tabs"></div></div>
<main id="main"></main>
<footer><div>원본 PDF에서 실제 형광펜·밑줄·펜 표시만 추출 → 키워드 중심 재정리 · 5개 전공 과목</div></footer>
</div><script>

, {"s": "보안 · 분석 도구", "c": [{"t": "OWASP TOP 10", "d": "웹 애플리케이션 취약점 10가지. (표시: Broken Access Control, Injection, Insecure Design, Security Misconfiguration, SSRF)", "p": 30}, {"t": "Injection", "d": "SQL·명령어·XSS 등 외부 입력이 코드/쿼리로 실행되는 취약점", "p": 30}, {"t": "정적 분석", "d": "소프트웨어를 실행하지 않고 코드 레벨에서 분석하는 방법", "p": 31}, {"t": "PMD", "d": "코드 문제를 사전에 확인하는 정적 분석용 오픈소스 분석 도구", "p": 31}, {"t": "String 불변성(Immutable)", "d": "문자열 메모리 공간이 변하지 않아, '+'로 문자열 추가 시 새 객체를 생성해 시간·자원을 소모", "p": 46}]}, {"s": "라이브러리 · 패키지", "c": [{"t": "Library", "d": "재사용·부품화를 위해 호출해 사용하는 모듈의 집합 (jQuery, DLL, Class, Jar)", "p": 62}, {"t": "Framework", "d": "응용프로그램 표준 구조를 구현하기 위한 클래스·라이브러리 모임 (Spring, Django)", "p": 62}, {"t": "Architecture", "d": "여러 컴퓨터 구성요소의 전반적 기계적 구조와 설계 방법 (모노리틱, MSA)", "p": 62}, {"t": "Platform", "d": "기능을 제공하며 프로그램 실행이 가능한 공통 실행 환경 (Window, Linux, JVM)", "p": 62}, {"t": "SW 라이선스", "d": "공개 SW 라이선스별 정책 비교 (예: GPL)", "p": 71}, {"t": "PyPI / pip", "d": "PyPI = 파이썬 패키지 저장소 / pip = PyPI가 권하는 파이썬 라이브러리 설치 툴", "p": 74}]}], "프로그래밍 언어 활용": [{"s": "구조적 프로그래밍", "c": [{"t": "빔-야코피니 정리(1966)", "d": "순차·선택·반복 3가지 제어구조만으로 모든 계산 가능한 알고리즘을 구현할 수 있음을 수학적으로 증명", "p": 16}, {"t": "다익스트라 / GOTO", "d": "다익스트라가 'GOTO문은 해롭다(1968)'에서 GOTO 무분별 사용이 프로그램 구조를 파괴한다고 주장", "p": 16}]}, {"s": "설계 · 테스트", "c": [{"t": "하향식 설계 4단계", "d": "①문제 정의·요구사항 명세화 ②기능 분해·구조화 ③모듈별 상세 논리 설계 ④구현·검증", "p": 20}, {"t": "기능 분해·구조화", "d": "복잡한 문제를 작은 단위로 나눔. 각 기능 = 독립 모듈(함수) → 재사용성·유지보수성↑", "p": 21}, {"t": "상향식 구현·테스트", "d": "단위 구현·단위 테스트 → 통합 구현·통합 테스트", "p": 23}]}, {"s": "오류 · 코드 검토", "c": [{"t": "바이트코드(Bytecode)", "d": "컴파일러가 소스(.java)를 특정 CPU 기계어가 아닌 중간언어 바이트코드(.class)로 생성", "p": 37}, {"t": "컴파일 오류", "d": "컴파일 과정에서 컴파일러가 발견, 가장 기본적이고 발견하기 쉬운 오류", "p": 38}, {"t": "런타임 오류", "d": "컴파일은 성공했지만 실행 도중 예기치 않은 문제로 비정상 종료", "p": 38}, {"t": "코드 검토(Code Review)", "d": "동료 검토(Peer Review) / 러버덕 디버깅(오리 인형에게 코드를 설명하다 스스로 모순을 깨닫는 방법)", "p": 40}]}, {"s": "객체지향(OOP)", "c": [{"t": "캡슐화(Encapsulation)", "d": "속성과 행위를 하나로 묶고 구현 일부를 외부에 감춤(은닉). 제공된 필드·메서드만 사용 = 은닉화", "p": 64}, {"t": "추상화(Abstraction)", "d": "공통적인 부분·관심 특성만 모은 것 (공통 메서드를 인터페이스로 정의하는 것도 포함)", "p": 64}, {"t": "다형성(Polymorphism)", "d": "같은 모양의 함수가 상황에 따라 다르게 동작 → 오버로딩·오버라이딩", "p": 64}, {"t": "상속(Inheritance)", "d": "부모 클래스에 새 기능을 추가해 자식 클래스를 만들어 사용하는 기법", "p": 64}, {"t": "오버로딩 vs 오버라이딩", "d": "오버로딩 = 이름 같고 매개변수 숫자·타입을 다르게 / 오버라이딩 = 상위 메서드를 하위에서 같은 이름으로 재정의", "p": 64}]}, {"s": "객체지향 설계원칙 (SOLID)", "c": [{"t": "단일 책임 원칙(SRP)", "d": "모든 클래스는 하나의 책임만 가져야 하고, 그 책임을 완전히 캡슐화", "p": 64}, {"t": "개방-폐쇄 원칙(OCP)", "d": "확장에는 열려 있고 수정에는 닫혀 있음 (기존 코드 변경 없이 기능 추가)", "p": 64}, {"t": "리스코프 치환 원칙(LSP)", "d": "자식 클래스는 부모 클래스를 대체할 수 있어야 함 (부모 자리에 자식 넣어도 동작)", "p": 65}, {"t": "인터페이스 분리 원칙(ISP)", "d": "한 클래스는 자신이 사용하지 않는 인터페이스는 구현하지 말아야 함", "p": 65}, {"t": "의존 역전 원칙(DIP)", "d": "변화가 없는 것(인터페이스·추상 클래스)에 의존해야 함", "p": 65}]}, {"s": "다이어그램 · 디자인 패턴", "c": [{"t": "시퀀스 다이어그램", "d": "객체 간 상호작용 메시지를 시간 흐름에 따라 나타내는 다이어그램", "p": 67}, {"t": "시퀀스 구성요소", "d": "활성 객체(라이프라인 가짐) · 메시지(상호작용·통신) · 활성 박스(라이프라인 위 박스, 객체 호출)", "p": 68}, {"t": "추상 팩토리", "d": "서로 연관·의존적인 객체의 조합들을 만드는 인터페이스를 제공하는 패턴", "p": 84}, {"t": "팩토리 메서드", "d": "객체 생성을 서브클래스로 분리해 처리하도록 캡슐화하는 패턴", "p": 84}, {"t": "싱글톤(Singleton)", "d": "전역변수 없이 객체를 하나만 생성, 어디서든 참조할 수 있게 하는 패턴", "p": 84}, {"t": "스크립트 언어 특징", "d": "인터프리터 언어, 단순한 구문·의미, 컴파일 언어보다 실행이 느림, 빠르게 배우고 작성하도록 고안", "p": 93}]}]}};const {order,meta,data}=P;let active=order[0];let quiz=false;
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function emph(s){return esc(s).replace(/\b([A-Z]{2,}[A-Za-z0-9]*|[A-Z][a-z]+[A-Z][A-Za-z0-9]*)\b/g,'<b>$1</b>')}
function cardHTML(c){return `<div class="card" onclick="this.classList.toggle('show')"><span class="pg">p.${c.p}</span><div class="term">${esc(c.t)}</div><div class="def">${emph(c.d)}</div></div>`}
function buildTabs(){const el=document.getElementById('tabs');
 el.innerHTML=order.map(s=>{const n=data[s].reduce((a,x)=>a+x.c.length,0);return `<button class="tab ${s===active?'active':''}" data-s="${esc(s)}">${meta[s].icon} ${esc(s)} <span class="cnt">${n}</span></button>`}).join('');
 el.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{active=b.dataset.s;document.getElementById('q').value='';buildTabs();render();})}
function renderSubject(s){let h=`<section class="section"><div class="coursehdr">${esc(meta[s].course)}</div><div class="subjtitle"><h2>${meta[s].icon} ${esc(s)}</h2><span class="n">${data[s].reduce((a,x)=>a+x.c.length,0)}개 카드</span></div>`;
 for(const sec of data[s]){h+=`<div class="sec"><div class="secname">${esc(sec.s)}</div>`;for(const c of sec.c)h+=cardHTML(c);h+='</div>'}return h+'</section>'}
function renderSearch(qq){const q=qq.trim().toLowerCase();let h='',n=0;
 for(const s of order){let hits=[];for(const sec of data[s])for(const c of sec.c)if((sec.s+' '+c.t+' '+c.d).toLowerCase().includes(q))hits.push(c);
  if(!hits.length)continue;h+=`<section class="section"><div class="subjtitle"><h2>${meta[s].icon} ${esc(s)}</h2><span class="n">${hits.length}개</span></div>`;for(const c of hits)h+=cardHTML(c);h+='</section>';n+=hits.length}
 return n?`<div class="secname" style="border:none;padding:0;margin:6px 0">"${esc(qq)}" 검색 결과 ${n}개</div>`+h:`<div class="empty">😶 "${esc(qq)}" 결과가 없어요.</div>`}
function render(){const q=document.getElementById('q').value,m=document.getElementById('main');
 if(q.trim()){m.innerHTML=renderSearch(q);document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))}else m.innerHTML=renderSubject(active)}
function toggleQuiz(){quiz=!quiz;document.body.classList.toggle('quiz',quiz);const b=document.getElementById('quizbtn');b.classList.toggle('on',quiz);b.textContent=quiz?'🙉 정답 보기 모드':'🙈 암기 모드';
 document.getElementById('hint').textContent=quiz?'암기 모드 ON · 카드를 누르면 설명이 나타나요. 다시 누르면 가려집니다.':'전체 '+P.total+'개 핵심 카드 · 실제 표시된 부분만 담았어요.'}
document.getElementById('q').addEventListener('input',render);
P.total=98;buildTabs();render();
